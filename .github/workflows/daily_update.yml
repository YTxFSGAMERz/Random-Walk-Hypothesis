name: 📊 Daily BTC Market Update

on:
  schedule:
    - cron: '0 0 * * *'   # Every day at 00:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write           # Allow the bot to commit and push

jobs:
  daily-update:
    name: Fetch BTC Price & Commit
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 📈 Fetch BTC price and update market log
        run: python update_market.py

      - name: 💾 Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market_log.md
          git diff --cached --quiet || git commit -m "📊 Daily BTC update — $(date +'%Y-%m-%d')"
          git push
